name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install --upgrade pip ruff tafsiri-mcp
      - name: Lint (ruff)
        run: ruff check . --ignore E501 --ignore F401 || true
      - name: Smoke test
        run: python -c "import tafsiri_mcp; print('import ok')"
